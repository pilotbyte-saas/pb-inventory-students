appId: com.pilotbyte.classroom-inventory
productName: Classroom Inventory
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
    - zip
  category: public.app-category.education
  icon: build/icon.icns
# Auto-update feed: this repo's GitHub Releases. With the repo public, the
# installed app reads updates with no token of its own.
publish:
  provider: github
  owner: pilotbyte-saas
  repo: pb-inventory-students
