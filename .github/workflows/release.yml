name: Release

# Push a version tag to build installers for Windows + macOS (Apple Silicon):
#   npm version patch        # bumps package.json + creates a v* tag
#   git push --follow-tags
#
# Build and publish are separate steps: installers always upload as artifacts
# (download from the run), and on a tag they're also published to this repo's
# Releases — which powers in-app auto-update.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    name: Build (${{ matrix.os }})
    permissions:
      contents: write # let the built-in token create the Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_args: --win --x64
            artifact_name: classroom-inventory-windows
          - os: macos-latest
            build_args: --mac --arm64
            artifact_name: classroom-inventory-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build

      - name: Build installers
        shell: bash
        # Unsigned builds. To enable macOS code signing later (needed for mac
        # auto-update), add a signing step that exports CSC_LINK /
        # CSC_KEY_PASSWORD ONLY when the secrets are non-empty — passing an empty
        # CSC_LINK makes electron-builder fail resolving the cert path.
        run: npx electron-builder ${{ matrix.build_args }} --publish never

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: warn

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/latest*.yml
            dist/*.blockmap
          fail_on_unmatched_files: false
