name: Release

# Push a version tag to build installers for Windows + macOS (Apple Silicon):
#   npm version patch        # bumps package.json + creates a v* tag
#   git push --follow-tags
#
# Installers are always uploaded as workflow artifacts (download from the run).
# If the RELEASES_TOKEN secret is set, they are ALSO published to the public
# releases repo, which is what powers in-app auto-update.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    name: Build (${{ matrix.os }})
    permissions:
      contents: write # let the built-in token publish to this repo's Releases
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_args: --win --x64
            artifact_name: classroom-inventory-windows
          - os: macos-latest
            build_args: --mac --arm64
            artifact_name: classroom-inventory-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build

      - name: Package${{ matrix.build_args }}
        shell: bash
        env:
          # Built-in token — publishes to THIS repo's Releases. Make the repo
          # public so the installed app reads updates with no token of its own.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional Apple Developer signing (required for macOS auto-update).
          # Safe to leave unset — the build still produces an installable .dmg.
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            npx electron-builder ${{ matrix.build_args }} --publish always
          else
            echo "Not a tag — building without publishing."
            npx electron-builder ${{ matrix.build_args }} --publish never
          fi

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
