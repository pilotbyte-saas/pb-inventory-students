name: Release

# Push a version tag to build installers for Windows + macOS (Apple Silicon)
# and publish them to this repo's Releases (which powers in-app auto-update):
#   npm version patch        # bumps package.json + creates a v* tag
#   git push --follow-tags
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_args: --win --x64
            artifact_name: classroom-inventory-windows
          - os: macos-latest
            build_args: --mac --arm64
            artifact_name: classroom-inventory-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build

      # Unsigned installers. To enable macOS code signing later (needed for mac
      # auto-update), add a step that exports CSC_LINK / CSC_KEY_PASSWORD ONLY
      # when the secrets are non-empty — an empty CSC_LINK breaks the build.
      - name: Build installers
        shell: bash
        run: npx electron-builder ${{ matrix.build_args }} --publish never

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: warn

  # Publish once, after both builds, so the two matrix jobs never race to create
  # the same release.
  publish:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/latest*.yml
            dist/*.blockmap
          fail_on_unmatched_files: false
