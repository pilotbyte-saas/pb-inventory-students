name: Release

# Push a version tag to build the installer and publish a GitHub Release:
#   npm version patch   # bumps package.json + creates a v* tag
#   git push --follow-tags
on:
  push:
    tags: ['v*']
  workflow_dispatch: {} # allow a manual run from the Actions tab

jobs:
  windows:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: write # needed to create/update the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer (electron-builder)
        run: npm run build:win

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          fail_on_unmatched_files: false
          generate_release_notes: true

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: classroom-inventory-windows
          path: dist/*.exe
          if-no-files-found: warn
